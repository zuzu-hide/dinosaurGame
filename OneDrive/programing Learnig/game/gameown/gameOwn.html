<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaur Game</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        :root {
            --z-base: 10;
            --z-charactor: 20;
            --z-body: 30;
            --z-gamePlace: 40;
            --z-overlay: 50;
            --z-button: 60;
            
        }
        body {
            position: absolute;
            width: 100vw;
            height: 100vh;

            scrollbar-width: none;
            background-color: rgb(149, 120, 83);
        }
        /*Game main code*/
        .game-space {
            position: absolute;
            inset: 50%;
            transform: translate(-50%, -50%);

            width: 600px;
            height: 200px;

            background-color: #ffffff;
            z-index: var(--z-gamePlace);
            overflow: hidden;
        }
        .scores {
            position: absolute;
            top: 10px;
            right: 30px;

            display: flex;
            flex-direction: row;
            gap: 8px;
        }
        .high-score {
            margin: 0  auto 0 0;
        }
        .score {
            margin: 0  auto 0 0;
        }

        .player {
            position: absolute;
            bottom: 0;
            left: 60px;

            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #cccccc;  
            z-index: var(--z-charactor);
        }
        .player.jump {
            animation: jump 0.75s ease;

            background: black;
        }
        @keyframes jump {
            0% {bottom: 0px}
            50% {bottom: 70px}
            100% {bottom: 0px}
        }
        .player.highjump {
            animation: highjump 0.8s ;

            background: yellow;
        }
        @keyframes highjump {
            0% {bottom: 0px}
            50% {bottom: 100px}
            100% {bottom: 0px}
        }
        .player.squat {
            height: 20px;
        }
        .player.slender {
            width: 20px;
        }
        .enemy.move {
            animation: move linear;
        }
        @keyframes move {
            0% { left: 100% } 
            100% { left: -60px; }
        }
        .enemy.ground {
            position: absolute;
            bottom: 0;
            left: 100%;
            
            width: 40px;
            height: 40px; 
            border-top-left-radius: 50%;  
            border-top-right-radius: 50%;
            
            background: #cccccc; 
            z-index: var(--z-charactor);        
        }
        .enemy.groundhigh {
            position: absolute;
            bottom: 0;
            left: 100%;
            
            width: 40px;
            height: 60px; 
            border-top-left-radius: 50%;  
            border-top-right-radius: 50%;
            
            background: #cccccc; 
            z-index: var(--z-charactor);        
        }
        .enemy.groundwider {
            position: absolute;
            bottom: 0;
            left: 100%;
            
            width: 56px;
            height: 40px; 
            border-top-left-radius: 50%;  
            border-top-right-radius: 50%;
            
            background: #cccccc; 
            z-index: var(--z-charactor);        
        }
        .enemy.lowerfly {
            position: absolute;
            bottom: 30px;
            left: 100%;
            
            width: 37px;
            height: 45px;   
            border-radius: 50%;
            background: #cccccc;
            z-index: var(--z-charactor);        
        }
        .enemy.upperfly {
            position: absolute;
            bottom: 70px;
            left: 100%;
            
            width: 40px;
            height: 30px;   
            border-radius: 50%;
            background: #cccccc; 
            z-index: var(--z-charactor);        
        }

        .ground {
            position: absolute;
            bottom: 24px;

            width: 100%;
            height: 2px;
            background: rgb(80, 80, 80);

            z-index: var(--z-base);
        }
        /*Game start || Game restart*/
        .start-btn {
            position: absolute;
            inset: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            cursor: pointer;

            width: 250px;
            height: 100px;

            font-size: 24px;
            color: #616161;

            background: white;
            border-radius: 10px;
            border: solid 2px #616161;
            z-index: var(--z-button);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            width: 270px;
            height: 110px;

            font-size: 28px;
            font-weight: 600;
            color: #212121;
            
            border: solid 4px #212121;
        }
        .start-btn.active {
            opacity: 1;
            pointer-events: all;
        }
        .restart-btn {
            position: absolute;
            inset: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            cursor: pointer;

            width: 250px;
            height: 100px;

            font-size: 24px;
            color: #616161;

            background: white;
            border-radius: 10px;
            border: solid 2px #616161;
            z-index: var(--z-button);
            transition: all 0.3s ease;
        }
        .restart-btn:hover {
            width: 270px;
            height: 110px;

            font-size: 28px;
            font-weight: 600;
            color: #212121;
            
            border: solid 4px #212121;
        }
        .restart-btn.active {
            opacity: 1;
            pointer-events: all;            
        }
        .overlay {
            opacity: 0;
            pointer-events: none;
            position: fixed;
            inset: 0;

            width: 100%;
            height: 100%;
            background: rgb(0, 0, 0, 0.4);

            transition: all 0.3s;
            z-index:  var(--z-overlay);
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
    </style>
</head>
<body>
    <div class="game-space" id="gameSpace">
        <div class="scores" id="scores">
            <div class="high-score" id="highScore"><span>HI:</span> 0</div>
            <span> | </span>
            <div class="score" id="score">0</div>
        </div>
        <div name="charactor">
            <div class="player" id="player"></div>
            <div class="enemy ground" data-enemy="ground"></div>
            <div class="enemy ground" data-enemy="ground"></div>
            <div class="enemy ground" data-enemy="ground"></div>
            <div class="enemy groundwider" data-enemy="ground"></div>
            <div class="enemy groundwider" data-enemy="ground"></div>
            <div class="enemy groundhigh" data-enemy="ground"></div>
            <div class="enemy groundhigh" data-enemy="ground"></div>
            <div class="enemy lowerfly" data-enemy="lowerfly"></div>
            <div class="enemy upperfly" data-enemy="upperfly"></div>
        </div>
        <div class="ground"></div>
    </div>
    <div class="buttons">
        <button class="start-btn active" id="startBtn">START</button>
        <button class="restart-btn" id="restartBtn">RESTART</button>
    </div>
    <div class="overlay active" id="overlay"></div>

    <script src="gameOwn.js"></script>
</body>
</html>
